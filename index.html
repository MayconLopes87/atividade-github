<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Simples</title>

  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f1f1f1;
  }

  form {
    background: white;
    padding: 15px;
    border-radius: 8px;
    width: 250px;
  }

  input {
    display: block;
    margin-bottom: 10px;
    width: 100%;
    padding: 5px;
  }

  button {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
  }
</style>

</head>
<body>
  <h1>Formulário de Cadastro</h1>

  <form>
  <label>Nome:</label>
  <input type="text">

  <label>Email:</label>
<input type="email">

<button type="submit">Enviar</button>
</form>
</body>
</html>
